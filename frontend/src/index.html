<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レシピ管理 - Vanilla JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>レシピ管理</h1>

    <!-- 検索セクション -->
    <div style="margin-bottom: 20px;">
        <input type="text" id="searchKeyword" placeholder="タイトルで検索...">
        <button id="searchBtn">検索</button>
    </div>

    <hr>

    <!-- フォームセクション -->
    <form id="recipeForm" style="border: 1px solid var(--border-color); padding: 15px; margin-bottom: 30px; background-color: #fff; border-radius: 8px;">
        <h3 id="formTitle">新しいレシピを登録</h3>
        <input type="hidden" id="recipeId">
        
        <div class="form-group">
            <label>タイトル:</label><br>
            <input type="text" id="title" required maxlength="100">
            <span id="error-title" class="error" style="color: var(--error-color);"></span>
        </div>

        <div class="form-group">
            <label>説明:</label><br>
            <textarea id="description"></textarea>
        </div>

        <div class="form-group">
            <label>カロリー (kcal):</label><br>
            <input type="number" id="calories" min="0" value="0">
            <span id="error-calories" class="error" style="color: var(--error-color);"></span>
        </div>

        <button type="submit" id="submitBtn">登録</button>
        <button type="button" id="cancelBtn" style="display:none;">キャンセル</button>
    </form>

    <!-- 一覧セクション -->
    <h3>レシピ一覧</h3>
    <table>
        <thead>
            <tr>
                <th>タイトル</th>
                <th>カロリー</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="recipeTableBody">
            <!-- 動的に生成されます -->
        </tbody>
    </table>

    <script src="app.js" type="module"></script>
</body>
</html>
